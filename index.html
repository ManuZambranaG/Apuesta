<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cara o Cruz - Manu vs Ale</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }

        .players-container {
            display: flex;
            justify-content: space-between;
            width: 80%;
            max-width: 400px;
            margin-bottom: 50px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .player {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        select {
            background-color: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            text-align: center;
        }

        .coin-container {
            perspective: 1000px;
            cursor: grab;
            margin-bottom: 40px;
            touch-action: none; 
        }
        
        .coin-container:active {
            cursor: grabbing;
        }

        .coin {
            width: 200px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            transition: transform 3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .front {
            background-image: url('cara.png');
            transform: rotateX(0deg); 
            -webkit-transform: rotateX(0deg);
        }

        .back {
            background-image: url('cruz.png');
            transform: rotateX(180deg) rotateZ(180deg); 
            -webkit-transform: rotateX(180deg) rotateZ(180deg);
        }

        #result-text {
            font-size: 1.5rem;
            min-height: 2rem;
            text-align: center;
            padding: 0 20px;
            color: #d4af37; /* Dorado */
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .show-result {
            opacity: 1 !important;
        }

        .instruction {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #777;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="players-container">
        <div class="player">
            <span>Manu</span>
            <select id="manu-select">
                <option value="cara">Cara</option>
                <option value="cruz">Cruz</option>
            </select>
        </div>
        <div class="player">
            <span>Ale</span>
            <select id="ale-select">
                <option value="cruz">Cruz</option>
                <option value="cara">Cara</option>
            </select>
        </div>
    </div>

    <div class="coin-container" id="coin-container">
        <div class="coin" id="coin">
            <div class="face front"></div>
            <div class="face back"></div>
        </div>
    </div>

    <div id="result-text"></div>
    <div class="instruction">Desliza hacia arriba para lanzar la moneda</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIh-yl2ctATe77NobiY5HSajZcCxKRvVc",
            authDomain: "moneda-f6738.firebaseapp.com",
            databaseURL: "https://moneda-f6738-default-rtdb.firebaseio.com",
            projectId: "moneda-f6738",
            storageBucket: "moneda-f6738.firebasestorage.app",
            messagingSenderId: "1094220938340",
            appId: "1:1094220938340:web:28ed54a0ef3740aac7b371"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'partida');

        const manuSelect = document.getElementById('manu-select');
        const aleSelect = document.getElementById('ale-select');
        const coin = document.getElementById('coin');
        const coinContainer = document.getElementById('coin-container');
        const resultText = document.getElementById('result-text');

        let isFlipping = false;
        let currentRotation = 0;
        let isDragging = false;
        let startY = 0;
        let endY = 0;
        
        let lastFlipId = null; 
        let currentResult = null;

        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if (!isFlipping) {
                if (data.manuEleccion && manuSelect.value !== data.manuEleccion) {
                    manuSelect.value = data.manuEleccion;
                }
                if (data.aleEleccion && aleSelect.value !== data.aleEleccion) {
                    aleSelect.value = data.aleEleccion;
                }
                
                if (data.ultimoResultado) {
                    currentResult = data.ultimoResultado;
                    actualizarTexto(currentResult);
                }
            }

            if (data.idTiro && data.idTiro !== lastFlipId) {
                lastFlipId = data.idTiro;
                ejecutarGiro(data.ultimoResultado);
            }
        });

        manuSelect.addEventListener('change', () => {
            const opuesto = manuSelect.value === 'cara' ? 'cruz' : 'cara';
            update(gameRef, { manuEleccion: manuSelect.value, aleEleccion: opuesto });
        });

        aleSelect.addEventListener('change', () => {
            const opuesto = aleSelect.value === 'cara' ? 'cruz' : 'cara';
            update(gameRef, { aleEleccion: aleSelect.value, manuEleccion: opuesto });
        });

        coinContainer.addEventListener('pointerdown', (e) => {
            startY = e.clientY;
            isDragging = true;
        });

        window.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            endY = e.clientY;
            isDragging = false;
            
            if (isFlipping) return;
            
            const distance = startY - endY;
            if (distance > 30 || Math.abs(distance) < 5) {
                iniciarTiroFirebase();
            }
        });

        function iniciarTiroFirebase() {
            const esCara = Math.random() < 0.5;
            const resultado = esCara ? 'cara' : 'cruz';
            const nuevoId = Date.now();

            update(gameRef, {
                idTiro: nuevoId,
                ultimoResultado: resultado
            });
        }

        function ejecutarGiro(resultado) {
            isFlipping = true;
            resultText.classList.remove('show-result');
            
            const esCara = resultado === 'cara';
            const baseRotation = currentRotation - (currentRotation % 360);
            const extraSpins = 1800; 
            const finalRotation = baseRotation + extraSpins + (esCara ? 0 : 180);
            
            coin.style.transform = `rotateX(${finalRotation}deg)`;
            currentRotation = finalRotation;

            // --- CORRECCIÓN AQUÍ ---
            setTimeout(() => {
                // PRIMERO apagamos el estado de giro
                isFlipping = false; 
                currentResult = resultado;
                
                // DESPUÉS calculamos y mostramos el texto
                actualizarTexto(resultado);
                resultText.classList.add('show-result');
            }, 3000); // 3 segundos de la animación
        }

        function actualizarTexto(resultado) {
            // Si la base de datos está vacía o la moneda está girando, no mostramos nada
            if (!resultado || isFlipping) return;

            let ganador = '';
            let perdedor = '';

            // Usamos las selecciones actuales de los menús
            if (manuSelect.value === resultado) {
                ganador = 'Manu';
                perdedor = 'Ale';
            } else {
                ganador = 'Ale';
                perdedor = 'Manu';
            }

            resultText.innerHTML = `<strong>${ganador}</strong> ganaste, pide lo que quieras a <strong>${perdedor}</strong>`;
        }
    </script>
</body>
</html>
    </script>
</body>
</html>
